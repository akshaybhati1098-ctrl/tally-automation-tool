<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'partials/head.html' %}

    <!-- =========================
         GLOBAL SPA PAGE CONTROL
    ========================== -->
    <style>
        /* CRITICAL: hide all pages by default */
        .page {
            display: none;
        }

        /* Only active page is visible */
        .page.active {
            display: block;
        }

        /* ===== FIX: Constrain main content width ===== */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 0 1rem;
            box-sizing: border-box; /* ensures padding doesn't add to width */
        }
    </style>

    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/excel_to_xml.css">
    <link rel="stylesheet" href="/static/css/login.css">
    <link rel="stylesheet" href="/static/css/dark-theme.css">
</head>
<body>

    <!-- =========================
         NAVBAR
    ========================== -->
    {% include 'partials/navbar.html' %}

    <!-- =========================
         MAIN SPA CONTENT (now width‑constrained)
    ========================== -->
    <div class="main-content">

        <div id="dashboard" class="page active">
            {% include 'pages/dashboard.html' %}
        </div>

        <div id="converter" class="page">
            {% include 'pages/excel_to_xml.html' %}
        </div>

        <div id="mapping" class="page">
            {% include 'pages/mapping.html' %}
        </div>

        <div id="settings" class="page">
            {% include 'pages/settings.html' %}
        </div>

        <div id="image_to_excel" class="page">
            {% include 'pages/image_to_excel.html' %}
        </div>

        <div id="company" class="page">
            {% include 'pages/company.html' %}
        </div>

    </div>

    <!-- =========================
         JS LIBRARIES
    ========================== -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <!-- =========================
         BASE SPA SCRIPT
    ========================== -->
    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
            });

            const page = document.getElementById(pageId);
            if (page) {
                page.classList.add('active');
            }
        }

        // Default page after login
        document.addEventListener("DOMContentLoaded", () => {
            // Check if there's a saved page preference in sessionStorage
            const savedPage = sessionStorage.getItem("activePage");
            if (savedPage) {
                showPage(savedPage);
                sessionStorage.removeItem("activePage");  // Clear it after use
            } else {
                showPage("dashboard");
            }
        });
    </script>

    <!-- =========================
         APP SCRIPTS
    ========================== -->
    <script src="/static/js/base.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/auth.js"></script>

    <!-- ===== FIX: Pass username to global window object ===== -->
    <script>
        window.currentUser = "{{ username if username else '' }}";
    </script>

</body>
</html>
