<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay's Tally Tool · Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f3f6fc;
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* ===== CARD STYLES ===== */
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px -5px rgba(0, 20, 40, 0.1);
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(2px);
            width: 100%;
        }

        .card:hover {
            box-shadow: 0 20px 35px -8px rgba(0, 30, 60, 0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }

        .card-header h3 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2b4f, #2a3f6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        /* Quick actions grid */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .action-card {
            background: #f8faff;
            border-radius: 20px;
            padding: 1.2rem 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e9eef7;
            font-weight: 500;
            color: #1e2b4f;
            text-decoration: none;
            display: block;
        }

        .action-card:hover {
            background: white;
            border-color: #b0c4de;
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -10px rgba(30, 60, 120, 0.2);
            color: #1e2b4f;
        }

        .action-card:active {
            transform: scale(0.97);
            background: #e4edfc;
            color: #1e2b4f;
        }

        .action-card .icon {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        /* Features grid - enlarged */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #f9fcff;
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            border: 1px solid #e9eff8;
            transition: all 0.2s;
        }

        .feature-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.03);
            border-color: #b0c4de;
        }

        .feature-icon {
            font-size: 2.2rem;
        }

        .feature-item b {
            font-size: 1.1rem;
            color: #1e2b4f;
        }

        .feature-item small {
            color: #5a6e8a;
            font-size: 0.85rem;
        }

        /* Coming soon badge */
        .coming-soon {
            display: inline-block;
            background: #2a3f6e;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            margin-left: 0.5rem;
            letter-spacing: 0.3px;
            vertical-align: middle;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Quick Actions Card -->
        <div class="card">
            <div class="card-header">
                <h3>⚡ Quick Actions</h3>
            </div>
            <div class="quick-actions">
                <div class="action-card" onclick="navigateTo('converter')">
                    <div class="icon">🔄</div>
                    <div>Convert Excel</div>
                </div>
                <div class="action-card" onclick="navigateTo('mapping')">
                    <div class="icon">⚙️</div>
                    <div>Edit Mapping</div>
                </div>
                <a href="/download-template" class="action-card">
                    <div class="icon">📥</div>
                    <div>Get Template</div>
                </a>
                <div class="action-card" onclick="viewReports()">
                    <div class="icon">📊</div>
                    <div>View Reports</div>
                </div>
            </div>
        </div>

        <!-- Key Features Card (enlarged) -->
        <div class="card">
            <div class="card-header">
                <h3>✨ Key Features</h3>
            </div>
            <div class="features-grid">
                <div class="feature-item">
                    <span class="feature-icon">🚀</span>
                    <div>
                        <b>Fast Conversion</b><br>
                        <small>1000+ invoices/sec</small>
                    </div>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">📊</span>
                    <div>
                        <b>GST Compliant</b><br>
                        <small>Accurate GST</small>
                    </div>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🔧</span>
                    <div>
                        <b>Flexible Mapping</b><br>
                        <small>Custom ledgers</small>
                    </div>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">💾</span>
                    <div>
                        <b>Auto Backup</b><br>
                        <small>Never lose data</small>
                    </div>
                </div>
                <!-- New Coming Soon Feature -->
                <div class="feature-item">
                    <span class="feature-icon">📄</span>
                    <div>
                        <b>PDF to Excel <span class="coming-soon">Coming Soon</span></b><br>
                        <small>Extract invoices from PDFs</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ----- NAVIGATION FUNCTIONS -----
        function navigateTo(page) {
            console.log(`Navigating to: ${page}`);
            alert(`🌐 Navigating to ${page} (demo)`);
        }

        function viewReports() {
            alert('📈 Opening reports dashboard (demo)');
        }
    </script>
</body>
</html>
