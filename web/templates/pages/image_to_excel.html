<div id="image2excel" class="page">
    <div class="card">
        <div class="card-header">
            <h3>PDF / Image to Excel Converter</h3>
        </div>

        <form id="imageConvertForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>PDF or Image File</label>
                <input
                    type="file"
                    name="file"
                    accept=".pdf,.jpg,.jpeg,.png"
                    required
                >
            </div>

            <div class="form-group">
                <label>Company</label>
                <select name="company" id="companySelect" required>
                    <option value="">-- Select Company --</option>
                    <!-- options injected by your existing JS -->
                </select>
            </div>

            <button
                type="submit"
                class="btn btn-primary"
                style="width:100%;"
            >
                Convert to Excel
            </button>
        </form>

        <div class="progress" id="imageProgress">
            <div class="progress-bar" id="imageProgressBar"></div>
        </div>

        <div id="imageMessage" class="message"></div>
    </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const data = JSON.parse(localStorage.getItem("company_rules")) || {};
    const select = document.getElementById("companySelect");

    for (const key in data) {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = data[key].label;
        select.appendChild(opt);
    }
});
</script>
