<div id="image2excel" class="page">
    <div class="card">
        <div class="card-header">
            <h3>PDF / Image to Excel Converter</h3>
        </div>
        <form id="imageConvertForm">
            <div class="form-group">
                <label>PDF or Image File</label>
                <input type="file" name="file" accept=".pdf,.jpg,.jpeg,.png" required>
            </div>
            <div class="form-group">
                <label>Company</label>
                <select name="company" id="companySelect" required>
                    <option value="">-- Select Company --</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Convert to Excel</button>
        </form>
        <div class="progress" id="imageProgress">
            <div class="progress-bar" id="imageProgressBar"></div>
        </div>
        <div id="imageMessage" class="message"></div>
    </div>
</div>
