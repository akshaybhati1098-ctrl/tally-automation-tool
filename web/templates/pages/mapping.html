<script>
    document.addEventListener('DOMContentLoaded', function() {
        // DOM elements with null checks
        const companyListEl = document.getElementById('companyList');
        const groupListEl = document.getElementById('groupList');
        const rateListEl = document.getElementById('rateList');
        const selectedCompanySpan = document.getElementById('selectedCompany');
        const currentGroupTitle = document.getElementById('currentGroupTitle');
        const renameCompanyBtn = document.getElementById('renameCompanyBtn');
        const deleteCompanyBtn = document.getElementById('deleteCompanyBtn');
        const addRateBtn = document.getElementById('addRateBtn');
        const saveMappingBtn = document.getElementById('saveMappingBtn');

        // Modals
        const companyModal = document.getElementById('companyModal');
        const rateModal = document.getElementById('rateModal');
        const companyModalTitle = document.getElementById('companyModalTitle');
        const companyNameInput = document.getElementById('companyNameInput');
        const companyModalOk = document.getElementById('companyModalOkBtn');
        const companyModalCancel = document.getElementById('companyModalCancelBtn');
        const modalRate = document.getElementById('modalRate');
        const modalLedger = document.getElementById('modalLedger');
        const modalOk = document.getElementById('modalOkBtn');
        const modalCancel = document.getElementById('modalCancelBtn');

        // State
        let companies = [];
        let selectedCompany = null;
        let selectedGroup = null;
        let currentMapping = null;

        const GROUP_KEYS = ['SALES', 'SALES_IGST', 'PURCHASE', 'CGST_RATES', 'SGST_RATES', 'IGST_RATES'];
        const GROUP_DISPLAY_NAMES = {
            'SALES': 'Sales (Local)',
            'SALES_IGST': 'Sales (IGST/Interstate)',
            'PURCHASE': 'Purchases',
            'CGST_RATES': 'CGST Rates',
            'SGST_RATES': 'SGST Rates',
            'IGST_RATES': 'IGST Rates'
        };

        // ===== COMPANY FUNCTIONS =====
        async function loadCompanies() {
            try {
                const res = await fetch('/api/companies');
                const data = await res.json();
                companies = data.companies || [];
                if (companyListEl) renderCompanyList();
            } catch (error) {
                console.error('Failed to load companies:', error);
                showError('Failed to load companies');
            }
        }

        function renderCompanyList() {
            if (!companyListEl) return;
            if (!companies.length) {
                companyListEl.innerHTML = '';
                return;
            }
            companyListEl.innerHTML = companies.map(name => `
                <div class="company-item ${name === selectedCompany ? 'active' : ''}" data-name="${name}">
                    ${name}
                </div>
            `).join('');
            document.querySelectorAll('.company-item').forEach(item => {
                item.addEventListener('click', () => selectCompany(item.dataset.name));
            });
        }

        async function selectCompany(name) {
            selectedCompany = name;
            selectedGroup = null;
            if (selectedCompanySpan) selectedCompanySpan.textContent = name;
            if (renameCompanyBtn) renameCompanyBtn.style.display = 'inline-block';
            if (deleteCompanyBtn) deleteCompanyBtn.style.display = 'inline-block';
            if (currentGroupTitle) currentGroupTitle.textContent = 'Select a group';

            try {
                const res = await fetch(`/api/mapping/${encodeURIComponent(name)}`);
                currentMapping = await res.json();
                if (groupListEl) renderGroupList();
                if (rateListEl) renderRateList();
            } catch (error) {
                console.error('Failed to load mapping:', error);
                showError('Failed to load company mapping');
            }
        }

        // ===== GROUP FUNCTIONS =====
        function renderGroupList() {
            if (!groupListEl) return;
            groupListEl.innerHTML = GROUP_KEYS.map(key => `
                <div class="group-item ${key === selectedGroup ? 'active' : ''}" data-key="${key}">
                    ${GROUP_DISPLAY_NAMES[key] || key}
                </div>
            `).join('');
            document.querySelectorAll('.group-item').forEach(item => {
                item.addEventListener('click', () => selectGroup(item.dataset.key));
            });
        }

        function selectGroup(key) {
            selectedGroup = key;
            if (currentGroupTitle) currentGroupTitle.textContent = GROUP_DISPLAY_NAMES[key] || key;
            renderRateList();
        }

        // ===== RATE FUNCTIONS =====
        function renderRateList() {
            if (!rateListEl) return;
            if (!selectedGroup || !currentMapping) {
                rateListEl.innerHTML = '';
                return;
            }
            const rates = currentMapping[selectedGroup] || {};
            const entries = Object.entries(rates);
            if (!entries.length) {
                rateListEl.innerHTML = '';
                return;
            }
            rateListEl.innerHTML = entries.map(([rate, ledger]) => `
                <div class="rate-item">
                    <span>${rate}% - ${ledger}</span>
                    <button class="btn btn-sm btn-danger" onclick="deleteRate('${rate}')">🗑️ Delete</button>
                </div>
            `).join('');
        }

        window.deleteRate = function(rate) {
            if (!selectedGroup || !currentMapping) return;
            if (confirm(`Delete rate ${rate}%?`)) {
                delete currentMapping[selectedGroup][rate];
                renderRateList();
            }
        };

        // ===== COMPANY ACTIONS =====
        const addCompanyBtn = document.getElementById('addCompanyBtn');
        if (addCompanyBtn) {
            addCompanyBtn.addEventListener('click', () => {
                if (companyModalTitle) companyModalTitle.textContent = 'Add Company';
                if (companyNameInput) companyNameInput.value = '';
                if (companyModal) companyModal.style.display = 'block';
                if (companyModalOk) companyModalOk.onclick = addCompanyHandler;
            });
        }

        async function addCompanyHandler() {
            const name = companyNameInput ? companyNameInput.value.trim() : '';
            if (!name) {
                alert('Please enter a company name');
                return;
            }
            const formData = new FormData();
            formData.append('name', name);
            try {
                const res = await fetch('/api/companies', {
                    method: 'POST',
                    body: formData
                });
                if (res.ok) {
                    if (companyModal) companyModal.style.display = 'none';
                    await loadCompanies();
                    showSuccess('Company added successfully');
                } else {
                    const err = await res.text();
                    alert('Failed to add company: ' + err);
                }
            } catch (error) {
                console.error('Error adding company:', error);
                alert('Failed to add company');
            }
        }

        if (renameCompanyBtn) {
            renameCompanyBtn.addEventListener('click', () => {
                if (!selectedCompany) return;
                if (companyModalTitle) companyModalTitle.textContent = 'Rename Company';
                if (companyNameInput) companyNameInput.value = selectedCompany;
                if (companyModal) companyModal.style.display = 'block';
                if (companyModalOk) companyModalOk.onclick = renameCompanyHandler;
            });
        }

        async function renameCompanyHandler() {
            const newName = companyNameInput ? companyNameInput.value.trim() : '';
            if (!newName) {
                alert('Please enter a company name');
                return;
            }
            if (confirm('Rename will delete the old company and create a new one. Continue?')) {
                try {
                    const mappingCopy = {...currentMapping};
                    const deleteRes = await fetch(`/api/companies/${encodeURIComponent(selectedCompany)}`, {
                        method: 'DELETE'
                    });
                    if (!deleteRes.ok) throw new Error('Failed to delete old company');
                    const formData = new FormData();
                    formData.append('name', newName);
                    const createRes = await fetch('/api/companies', {
                        method: 'POST',
                        body: formData
                    });
                    if (!createRes.ok) throw new Error('Failed to create new company');
                    const saveRes = await fetch(`/api/mapping/${encodeURIComponent(newName)}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(mappingCopy)
                    });
                    if (!saveRes.ok) throw new Error('Failed to save mapping');
                    if (companyModal) companyModal.style.display = 'none';
                    await loadCompanies();
                    await selectCompany(newName);
                    showSuccess('Company renamed successfully');
                } catch (error) {
                    console.error('Error renaming company:', error);
                    alert('Failed to rename company: ' + error.message);
                }
            }
        }

        if (deleteCompanyBtn) {
            deleteCompanyBtn.addEventListener('click', async () => {
                if (!selectedCompany) return;
                if (!confirm(`Are you sure you want to delete company "${selectedCompany}"? This cannot be undone.`)) return;
                try {
                    const res = await fetch(`/api/companies/${encodeURIComponent(selectedCompany)}`, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        selectedCompany = null;
                        selectedGroup = null;
                        currentMapping = null;
                        if (selectedCompanySpan) selectedCompanySpan.textContent = 'Select a company';
                        if (renameCompanyBtn) renameCompanyBtn.style.display = 'none';
                        if (deleteCompanyBtn) deleteCompanyBtn.style.display = 'none';
                        if (groupListEl) groupListEl.innerHTML = '';
                        if (rateListEl) rateListEl.innerHTML = '';
                        if (currentGroupTitle) currentGroupTitle.textContent = 'Select a group';
                        await loadCompanies();
                        showSuccess('Company deleted successfully');
                    } else {
                        alert('Failed to delete company');
                    }
                } catch (error) {
                    console.error('Error deleting company:', error);
                    alert('Failed to delete company');
                }
            });
        }

        // ===== RATE ACTIONS =====
        if (addRateBtn) {
            addRateBtn.addEventListener('click', () => {
                if (!selectedGroup) {
                    alert('Please select a group first');
                    return;
                }
                if (!selectedCompany) {
                    alert('Please select a company first');
                    return;
                }
                if (modalRate) modalRate.value = '';
                if (modalLedger) modalLedger.value = '';
                if (rateModal) rateModal.style.display = 'block';
            });
        }

        if (modalOk) {
            modalOk.addEventListener('click', async () => {
                const rate = modalRate ? parseFloat(modalRate.value) : NaN;
                const ledger = modalLedger ? modalLedger.value.trim() : '';
                if (isNaN(rate) || rate <= 0) {
                    alert('Please enter a valid rate');
                    return;
                }
                if (!ledger) {
                    alert('Please enter a ledger name');
                    return;
                }
                if (!currentMapping[selectedGroup]) currentMapping[selectedGroup] = {};
                currentMapping[selectedGroup][rate] = ledger;
                renderRateList();
                if (rateModal) rateModal.style.display = 'none';
                showSuccess('Rate added successfully');
            });
        }

        if (modalCancel) {
            modalCancel.addEventListener('click', () => {
                if (rateModal) rateModal.style.display = 'none';
            });
        }

        // ===== SAVE MAPPING =====
        if (saveMappingBtn) {
            saveMappingBtn.addEventListener('click', async () => {
                if (!selectedCompany) {
                    alert('Please select a company first');
                    return;
                }
                if (!currentMapping) {
                    alert('No mapping data to save');
                    return;
                }
                try {
                    const res = await fetch(`/api/mapping/${encodeURIComponent(selectedCompany)}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(currentMapping)
                    });
                    if (res.ok) {
                        showSuccess('Mapping saved successfully');
                    } else {
                        alert('Failed to save mapping');
                    }
                } catch (error) {
                    console.error('Error saving mapping:', error);
                    alert('Failed to save mapping');
                }
            });
        }

        // ===== MODAL CLOSE HANDLERS =====
        if (companyModalCancel) {
            companyModalCancel.addEventListener('click', () => {
                if (companyModal) companyModal.style.display = 'none';
            });
        }

        window.addEventListener('click', (e) => {
            if (e.target === companyModal) {
                companyModal.style.display = 'none';
            }
            if (e.target === rateModal) {
                rateModal.style.display = 'none';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (companyModal) companyModal.style.display = 'none';
                if (rateModal) rateModal.style.display = 'none';
            }
        });

        // ===== UTILITY FUNCTIONS =====
        function showSuccess(message) {
            console.log('Success:', message);
            // You can replace with a toast notification
        }

        function showError(message) {
            console.error('Error:', message);
            alert(message);
        }

        // Initialize
        loadCompanies();
    });
</script>
