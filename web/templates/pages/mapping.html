<div class="card">
    <div class="card-header">
        <h3>Ledger Mapping Editor</h3>
    </div>
    <div class="mapping-container" style="display: flex; gap: 2rem;">
        <!-- Left: Company List -->
        <div class="company-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h4><i class="icon">🏢</i> Companies</h4>
                <button class="btn btn-success btn-sm" id="addCompanyBtn" title="Add new company">➕ Add</button>
            </div>
            <div id="companyList" class="company-list"></div>
        </div>

        <!-- Right: Mapping Editor for selected company -->
        <div class="mapping-panel">
            <div class="group-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h4><i class="icon">📋</i> Ledger Groups for <span id="selectedCompany" class="company-name">Select a company</span></h4>
                    <div>
                        <button class="btn btn-warning btn-sm" id="renameCompanyBtn" title="Rename company" style="display: none;">✏️ Rename</button>
                        <button class="btn btn-danger btn-sm" id="deleteCompanyBtn" title="Delete company" style="display: none;">🗑️ Delete</button>
                    </div>
                </div>
                <div id="groupList" class="group-list"></div>
            </div>

            <div class="rate-panel">
                <h4 id="currentGroupTitle">Select a group</h4>
                <div id="rateList" class="rate-list"></div>
                <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <button class="btn btn-success" id="addRateBtn">➕ Add Rate</button>
                    <button class="btn btn-primary" id="saveMappingBtn">💾 Save Mapping</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Rate Modal -->
<div id="rateModal" class="modal">
    <div class="modal-content">
        <h3>Add GST Rate</h3>
        <div class="form-group">
            <label for="modalRate">GST Rate (%)</label>
            <input type="number" id="modalRate" step="0.01" min="0" max="100" placeholder="e.g., 18">
        </div>
        <div class="form-group">
            <label for="modalLedger">Ledger Name</label>
            <input type="text" id="modalLedger" placeholder="e.g., Local Sale @18%">
        </div>
        <div class="modal-actions">
            <button class="btn btn-success" id="modalOkBtn">OK</button>
            <button class="btn btn-danger" id="modalCancelBtn">Cancel</button>
        </div>
    </div>
</div>

<!-- Company Name Modal (for Add/Rename) -->
<div id="companyModal" class="modal">
    <div class="modal-content">
        <h3 id="companyModalTitle">Add Company</h3>
        <div class="form-group">
            <label for="companyNameInput">Company Name</label>
            <input type="text" id="companyNameInput" placeholder="Enter company name">
        </div>
        <div class="modal-actions">
            <button class="btn btn-success" id="companyModalOkBtn">OK</button>
            <button class="btn btn-danger" id="companyModalCancelBtn">Cancel</button>
        </div>
    </div>
</div>

<!-- Minimal CSS for the mapping editor (add to your global styles if not already present) -->
<style>
    .company-list, .group-list, .rate-list {
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 0.5rem;
    }
    .company-item, .group-item {
        padding: 0.5rem;
        cursor: pointer;
        border-bottom: 1px solid #eee;
    }
    .company-item:hover, .group-item:hover {
        background-color: #f5f5f5;
    }
    .company-item.active, .group-item.active {
        background-color: #e0e0e0;
        font-weight: bold;
    }
    .rate-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem;
        border-bottom: 1px solid #eee;
    }
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
        background-color: #fefefe;
        margin: 15% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 350px;
        border-radius: 5px;
    }
    .form-group {
        margin-bottom: 1rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.3rem;
    }
    .form-group input {
        width: 100%;
        padding: 0.5rem;
        box-sizing: border-box;
    }
    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
    }
</style>

<script>
    // DOM elements
    const companyListEl = document.getElementById('companyList');
    const groupListEl = document.getElementById('groupList');
    const rateListEl = document.getElementById('rateList');
    const selectedCompanySpan = document.getElementById('selectedCompany');
    const currentGroupTitle = document.getElementById('currentGroupTitle');
    const renameCompanyBtn = document.getElementById('renameCompanyBtn');
    const deleteCompanyBtn = document.getElementById('deleteCompanyBtn');
    const addRateBtn = document.getElementById('addRateBtn');
    const saveMappingBtn = document.getElementById('saveMappingBtn');

    // Modals
    const companyModal = document.getElementById('companyModal');
    const rateModal = document.getElementById('rateModal');
    const companyModalTitle = document.getElementById('companyModalTitle');
    const companyNameInput = document.getElementById('companyNameInput');
    const companyModalOk = document.getElementById('companyModalOkBtn');
    const companyModalCancel = document.getElementById('companyModalCancelBtn');
    const modalRate = document.getElementById('modalRate');
    const modalLedger = document.getElementById('modalLedger');
    const modalOk = document.getElementById('modalOkBtn');
    const modalCancel = document.getElementById('modalCancelBtn');

    // State
    let companies = [];                // list of company names
    let selectedCompany = null;        // current company name
    let selectedGroup = null;          // current group key (e.g. "CGST_RATES")
    let currentMapping = null;         // full mapping object for selected company

    // ---- Load companies ----
    async function loadCompanies() {
        const res = await fetch('/api/companies');
        const data = await res.json();
        companies = data.companies;     // array of names
        renderCompanyList();
    }

    function renderCompanyList() {
        companyListEl.innerHTML = companies.map(name => `
            <div class="company-item ${name === selectedCompany ? 'active' : ''}" data-name="${name}">
                ${name}
            </div>
        `).join('');
        document.querySelectorAll('.company-item').forEach(item => {
            item.addEventListener('click', () => selectCompany(item.dataset.name));
        });
    }

    // ---- Select a company ----
    async function selectCompany(name) {
        selectedCompany = name;
        selectedCompanySpan.textContent = name;
        renameCompanyBtn.style.display = 'inline-block';
        deleteCompanyBtn.style.display = 'inline-block';

        // Load mapping for this company
        const res = await fetch(`/api/mapping/${encodeURIComponent(name)}`);
        currentMapping = await res.json();
        renderGroupList();
    }

    // ---- Groups are the top‑level keys in the mapping ----
    const GROUP_KEYS = ['SALES', 'SALES_IGST', 'PURCHASE', 'CGST_RATES', 'SGST_RATES', 'IGST_RATES'];

    function renderGroupList() {
        groupListEl.innerHTML = GROUP_KEYS.map(key => `
            <div class="group-item ${key === selectedGroup ? 'active' : ''}" data-key="${key}">
                ${key}
            </div>
        `).join('');
        document.querySelectorAll('.group-item').forEach(item => {
            item.addEventListener('click', () => selectGroup(item.dataset.key));
        });
    }

    function selectGroup(key) {
        selectedGroup = key;
        currentGroupTitle.textContent = key;
        renderRateList();
    }

    function renderRateList() {
        if (!selectedGroup || !currentMapping) return;
        const rates = currentMapping[selectedGroup] || {};
        rateListEl.innerHTML = Object.entries(rates).map(([rate, ledger]) => `
            <div class="rate-item">
                <span>${rate}% - ${ledger}</span>
                <button class="btn btn-sm btn-danger" onclick="deleteRate('${rate}')">🗑️</button>
            </div>
        `).join('');
    }

    // ---- Delete a rate (optional) ----
    window.deleteRate = function(rate) {
        if (!selectedGroup || !currentMapping) return;
        delete currentMapping[selectedGroup][rate];
        renderRateList();
    };

    // ---- Add Company ----
    document.getElementById('addCompanyBtn').addEventListener('click', () => {
        companyModalTitle.textContent = 'Add Company';
        companyNameInput.value = '';
        companyModal.style.display = 'block';
        // Reset OK handler
        companyModalOk.onclick = addCompanyHandler;
    });

    async function addCompanyHandler() {
        const name = companyNameInput.value.trim();
        if (!name) return alert('Company name required');

        // Your backend expects form data, not JSON
        const formData = new FormData();
        formData.append('name', name);

        const res = await fetch('/api/companies', {
            method: 'POST',
            body: formData
        });
        if (res.ok) {
            companyModal.style.display = 'none';
            loadCompanies();
        } else {
            const err = await res.text();
            alert('Failed to add company: ' + err);
        }
    }

    // ---- Rename Company ----
    renameCompanyBtn.addEventListener('click', () => {
        if (!selectedCompany) return;
        companyModalTitle.textContent = 'Rename Company';
        companyNameInput.value = selectedCompany;
        companyModal.style.display = 'block';
        companyModalOk.onclick = renameCompanyHandler;
    });

    async function renameCompanyHandler() {
        const newName = companyNameInput.value.trim();
        if (!newName) return alert('Company name required');

        // Your backend doesn't have a rename endpoint yet – we need to simulate
        // by deleting old and creating new, then copying mapping.
        // For simplicity, we'll just show an alert.
        alert('Rename not implemented in backend. You can delete and re-add.');
        companyModal.style.display = 'none';
    }

    // ---- Delete Company ----
    deleteCompanyBtn.addEventListener('click', async () => {
        if (!selectedCompany || !confirm(`Delete company "${selectedCompany}"?`)) return;
        const res = await fetch(`/api/companies/${encodeURIComponent(selectedCompany)}`, {
            method: 'DELETE'
        });
        if (res.ok) {
            selectedCompany = null;
            selectedCompanySpan.textContent = 'Select a company';
            renameCompanyBtn.style.display = 'none';
            deleteCompanyBtn.style.display = 'none';
            groupListEl.innerHTML = '';
            rateListEl.innerHTML = '';
            loadCompanies();
        } else {
            alert('Failed to delete company');
        }
    });

    // ---- Add Rate ----
    addRateBtn.addEventListener('click', () => {
        if (!selectedGroup) return alert('Select a group first');
        modalRate.value = '';
        modalLedger.value = '';
        rateModal.style.display = 'block';
    });

    modalOk.addEventListener('click', async () => {
        const rate = parseFloat(modalRate.value);
        const ledger = modalLedger.value.trim();
        if (isNaN(rate) || !ledger) return alert('Fill all fields');

        // Add to current mapping in memory
        if (!currentMapping[selectedGroup]) currentMapping[selectedGroup] = {};
        currentMapping[selectedGroup][rate] = ledger;

        renderRateList();
        rateModal.style.display = 'none';
    });

    modalCancel.addEventListener('click', () => {
        rateModal.style.display = 'none';
    });

    // ---- Save Mapping ----
    saveMappingBtn.addEventListener('click', async () => {
        if (!selectedCompany) return alert('Select a company');

        const res = await fetch(`/api/mapping/${encodeURIComponent(selectedCompany)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(currentMapping)
        });
        if (res.ok) {
            alert('Mapping saved');
        } else {
            alert('Save failed');
        }
    });

    // ---- Close modals when clicking outside ----
    window.addEventListener('click', (e) => {
        if (e.target === companyModal) companyModal.style.display = 'none';
        if (e.target === rateModal) rateModal.style.display = 'none';
    });

    // Initial load
    loadCompanies();
</script>
