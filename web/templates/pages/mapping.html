<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger Mapping Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════
       ALL STYLES SCOPED UNDER .mapping-wrap
       Zero global bleed — safe to embed anywhere
    ══════════════════════════════════════════ */
    .mapping-wrap {
      --ink:       #0d1117;
      --ink2:      #1c2534;
      --ink3:      #354460;
      --muted:     #7a8fa8;
      --line:      #dce5f0;
      --line2:     #c8d8ec;
      --surface:   #f5f8fc;
      --surface2:  #eef3fa;
      --white:     #ffffff;
      --accent:    #1651e8;
      --accent2:   #3b29e8;
      --green:     #17b26a;
      --green2:    #0e9956;
      --amber:     #d97706;
      --amber-bg:  rgba(217,119,6,0.08);
      --red:       #dc2626;
      --red-bg:    rgba(220,38,38,0.07);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
    }

    /* ── Keyframes ── */
    @keyframes mpFadeUp {
      from { opacity: 0; transform: translateY(18px) scale(0.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes mpSlideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes mpPop {
      0%   { transform: scale(0.93); opacity: 0; }
      65%  { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes mpActiveBar {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }

    /* ── Card ── */
    .mapping-wrap .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 1.8rem 2rem;
      box-shadow: 0 1px 3px rgba(0,20,60,0.04), 0 8px 28px rgba(0,20,60,0.07);
      animation: mpFadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
      transition: box-shadow 0.25s;
    }

    /* ── Card header ── */
    .mapping-wrap .card-header {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-bottom: 1.8rem;
      padding-bottom: 1.3rem;
      border-bottom: 1px solid var(--line);
    }

    .mapping-wrap .card-header-icon {
      width: 48px; height: 48px;
      background: var(--ink);
      border-radius: 14px;
      display: grid; place-items: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(13,17,23,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .mapping-wrap .card-header-icon:hover {
      transform: rotate(-4deg) scale(1.05);
      box-shadow: 0 6px 20px rgba(13,17,23,0.28);
    }

    .mapping-wrap .card-header-text { display: flex; flex-direction: column; gap: 0.1rem; }

    .mapping-wrap .card-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .mapping-wrap .card-header h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0;
      color: var(--ink);
      margin: 0;
      line-height: 1.2;
    }

    .mapping-wrap .card-header-sub {
      font-size: 0.73rem;
      color: var(--muted);
      margin-top: 0.05rem;
    }

    /* ── Layout grid ── */
    .mapping-wrap .mapping-container {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 1.4rem;
      align-items: start;
    }

    /* ── Panel heading row ── */
    .mapping-wrap .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
    }

    .mapping-wrap .panel-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--ink3);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* ── Scrollable lists ── */
    .mapping-wrap .company-list,
    .mapping-wrap .group-list,
    .mapping-wrap .rate-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      background: var(--white);
      box-shadow: 0 2px 8px rgba(0,20,60,0.04);
      scrollbar-width: thin;
      scrollbar-color: var(--line2) transparent;
    }
    .mapping-wrap .company-list::-webkit-scrollbar,
    .mapping-wrap .group-list::-webkit-scrollbar,
    .mapping-wrap .rate-list::-webkit-scrollbar { width: 4px; }
    .mapping-wrap .company-list::-webkit-scrollbar-thumb,
    .mapping-wrap .group-list::-webkit-scrollbar-thumb,
    .mapping-wrap .rate-list::-webkit-scrollbar-thumb {
      background: var(--line2); border-radius: 4px;
    }

    /* ── Company / Group rows ── */
    .mapping-wrap .company-item,
    .mapping-wrap .group-item {
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid var(--surface);
      transition: background 0.15s, padding-left 0.2s cubic-bezier(0.22,1,0.36,1), color 0.15s;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--ink3);
      position: relative;
      animation: mpSlideIn 0.22s ease both;
    }
    .mapping-wrap .company-item:last-child,
    .mapping-wrap .group-item:last-child { border-bottom: none; }

    .mapping-wrap .company-item:hover,
    .mapping-wrap .group-item:hover {
      background: var(--surface);
      padding-left: 1.35rem;
      color: var(--ink2);
    }

    .mapping-wrap .company-item.active,
    .mapping-wrap .group-item.active {
      background: rgba(22,81,232,0.07);
      color: var(--accent);
      font-weight: 600;
      padding-left: 1rem;
    }

    /* Animated accent bar on active */
    .mapping-wrap .company-item.active::before,
    .mapping-wrap .group-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
      border-radius: 0 3px 3px 0;
      animation: mpActiveBar 0.2s cubic-bezier(0.22,1,0.36,1) both;
      transform-origin: top;
    }

    /* ── Rate rows ── */
    .mapping-wrap .rate-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.72rem 1rem;
      border-bottom: 1px solid var(--surface);
      font-size: 0.83rem;
      color: var(--ink2);
      transition: background 0.15s;
      animation: mpSlideIn 0.2s ease both;
    }
    .mapping-wrap .rate-item:last-child { border-bottom: none; }
    .mapping-wrap .rate-item:hover { background: var(--surface); }

    /* Rate % badge */
    .mapping-wrap .rate-item b {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      background: rgba(22,81,232,0.08);
      border: 1px solid rgba(22,81,232,0.16);
      border-radius: 5px;
      padding: 0.08rem 0.45rem;
      margin-right: 0.25rem;
    }

    /* ── Edit / Delete action buttons ── */
    .mapping-wrap .rate-actions {
      display: flex;
      gap: 0.35rem;
    }

    .mapping-wrap .rate-actions button {
      width: 30px; height: 30px;
      background: var(--surface);
      border: 1px solid var(--line);
      cursor: pointer;
      font-size: 0.88rem;
      border-radius: 8px;
      display: grid; place-items: center;
      transition: background 0.15s, border-color 0.15s, transform 0.18s cubic-bezier(0.22,1,0.36,1), box-shadow 0.15s;
    }
    .mapping-wrap .rate-actions .btn-edit:hover {
      background: rgba(22,81,232,0.08);
      border-color: rgba(22,81,232,0.25);
      transform: scale(1.14);
      box-shadow: 0 2px 8px rgba(22,81,232,0.14);
    }
    .mapping-wrap .rate-actions .btn-delete:hover {
      background: var(--red-bg);
      border-color: rgba(220,38,38,0.28);
      transform: scale(1.14);
      box-shadow: 0 2px 8px rgba(220,38,38,0.14);
    }
    .mapping-wrap .rate-actions button:active {
      transform: scale(0.92);
    }

    /* ── Rate panel separator ── */
    .mapping-wrap .rate-panel {
      margin-top: 1.4rem;
      padding-top: 1.4rem;
      border-top: 1px solid var(--line);
    }

    .mapping-wrap #currentGroupTitle {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--ink2);
      letter-spacing: -0.02em;
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mapping-wrap #currentGroupTitle::before {
      content: '';
      width: 3px; height: 16px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Company name badge ── */
    .mapping-wrap .company-name {
      font-weight: 700;
      color: var(--accent);
      background: rgba(22,81,232,0.08);
      border: 1px solid rgba(22,81,232,0.18);
      padding: 0.18rem 0.65rem;
      border-radius: 100px;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* ══════════════════════════════
       BUTTONS
    ══════════════════════════════ */
    .mapping-wrap .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.58rem 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      transition:
        transform 0.2s cubic-bezier(0.22,1,0.36,1),
        box-shadow 0.18s,
        background 0.15s,
        opacity 0.15s;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    /* Shine gloss */
    .mapping-wrap .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.16), transparent 58%);
      pointer-events: none;
      border-radius: inherit;
    }

    /* Ripple on active */
    .mapping-wrap .btn::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.22);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
      opacity: 0;
    }
    .mapping-wrap .btn:active::after {
      width: 300px; height: 300px; opacity: 0;
      transition: 0s;
    }

    .mapping-wrap .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .mapping-wrap .btn:active:not(:disabled) { transform: scale(0.96) translateY(0); }

    .mapping-wrap .btn-sm {
      padding: 0.38rem 0.8rem;
      font-size: 0.75rem;
      border-radius: 8px;
    }

    /* Success — green */
    .mapping-wrap .btn-success {
      background: var(--green);
      color: var(--white);
      box-shadow: 0 3px 10px rgba(23,178,106,0.28);
    }
    .mapping-wrap .btn-success:hover {
      background: var(--green2);
      box-shadow: 0 7px 20px rgba(23,178,106,0.4);
    }

    /* Primary — blue gradient */
    .mapping-wrap .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: var(--white);
      box-shadow: 0 3px 12px rgba(22,81,232,0.3);
    }
    .mapping-wrap .btn-primary:hover {
      box-shadow: 0 8px 22px rgba(22,81,232,0.42);
    }

    /* Warning — amber ghost */
    .mapping-wrap .btn-warning {
      background: var(--amber-bg);
      color: var(--amber);
      border: 1.5px solid rgba(217,119,6,0.22);
      box-shadow: none;
    }
    .mapping-wrap .btn-warning:hover {
      background: rgba(217,119,6,0.14);
      box-shadow: 0 4px 12px rgba(217,119,6,0.18);
    }
    .mapping-wrap .btn-warning::before { display: none; }

    /* Danger — red ghost */
    .mapping-wrap .btn-danger {
      background: var(--red-bg);
      color: var(--red);
      border: 1.5px solid rgba(220,38,38,0.2);
      box-shadow: none;
    }
    .mapping-wrap .btn-danger:hover {
      background: rgba(220,38,38,0.13);
      box-shadow: 0 4px 12px rgba(220,38,38,0.18);
    }
    .mapping-wrap .btn-danger::before { display: none; }

    /* ── h4 headings in panels ── */
    .mapping-wrap h4 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink2);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    /* ── Action button row ── */
    .mapping-wrap .action-row {
      display: flex;
      gap: 0.55rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    /* ── Empty states ── */
    .mapping-wrap .company-list:empty::after,
    .mapping-wrap .group-list:empty::after,
    .mapping-wrap .rate-list:empty::after {
      content: "No items to display";
      display: block;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .mapping-wrap .rate-list:empty::after   { content: "No rates yet — click Add Rate to create one."; }
    .mapping-wrap .company-list:empty::after { content: "No companies found — click Add to create one."; }
    .mapping-wrap .group-list:empty::after   { content: "Select a company to view groups."; }

    /* ══════════════════════════════
       MODAL
    ══════════════════════════════ */
    .mapping-wrap .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      inset: 0;
      background: rgba(10,15,25,0.52);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
    }
    .mapping-wrap .modal.show { display: flex; }

    .mapping-wrap .modal-content {
      background: var(--white);
      width: 420px;
      max-width: calc(100vw - 2rem);
      border-radius: 22px;
      padding: 2rem;
      box-shadow:
        0 0 0 1px var(--line),
        0 24px 60px rgba(0,10,40,0.18),
        0 4px 12px rgba(0,10,40,0.08);
      animation: mpPop 0.38s cubic-bezier(0.22,1,0.36,1) both;
    }

    .mapping-wrap .modal-content h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin: 0 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .mapping-wrap .modal-content h3::before {
      content: '';
      width: 4px; height: 18px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
      border-radius: 3px;
      flex-shrink: 0;
    }

    .mapping-wrap .modal .form-group { margin-bottom: 1.2rem; }

    .mapping-wrap .modal .form-group label {
      display: block;
      margin-bottom: 0.45rem;
      font-size: 0.71rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink3);
    }

    .mapping-wrap .modal .form-group input {
      width: 100%;
      padding: 0.78rem 1rem;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink2);
      background: var(--surface);
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .mapping-wrap .modal .form-group input:hover {
      border-color: var(--line2);
      background: var(--white);
    }
    .mapping-wrap .modal .form-group input:focus {
      border-color: var(--accent);
      background: var(--white);
      box-shadow: 0 0 0 3.5px rgba(22,81,232,0.12);
    }

    .mapping-wrap .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
      margin-top: 1.6rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--line);
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .mapping-wrap .mapping-container { grid-template-columns: 1fr; }
      .mapping-wrap .card { padding: 1.2rem 1.1rem; }
    }
  </style>
</head>
<body>
<div class="mapping-wrap">

  <div class="card">

    <!-- Card header -->
    <div class="card-header">
      <div class="card-header-icon">🗂️</div>
      <div class="card-header-text">
        <div class="card-eyebrow">Tally Configuration</div>
        <h3>Ledger Mapping Editor</h3>
        <p class="card-header-sub">Map GST rates to Tally ledger names per company</p>
      </div>
    </div>

    <div class="mapping-container">

      <!-- Left: Company panel -->
      <div class="company-panel">
        <div class="panel-head">
          <div class="panel-title">🏢 Companies</div>
          <button class="btn btn-success btn-sm" id="addCompanyBtn" title="Add new company">➕ Add</button>
        </div>
        <div id="companyList" class="company-list"></div>
      </div>

      <!-- Right: Mapping panel -->
      <div class="mapping-panel">

        <div class="group-panel">
          <div class="panel-head">
            <h4>
              📋 Ledger Groups for
              <span id="selectedCompany" class="company-name">Select a company</span>
            </h4>
            <div style="display:flex;gap:0.4rem;flex-shrink:0;">
              <button class="btn btn-warning btn-sm" id="renameCompanyBtn" title="Rename company" style="display:none;">✏️ Rename</button>
              <button class="btn btn-danger btn-sm" id="deleteCompanyBtn" title="Delete company" style="display:none;">🗑️ Delete</button>
            </div>
          </div>
          <div id="groupList" class="group-list"></div>
        </div>

        <div class="rate-panel">
          <h4 id="currentGroupTitle">Select a group</h4>
          <div id="rateList" class="rate-list"></div>
          <div class="action-row">
            <button class="btn btn-success" id="addRateBtn">➕ Add Rate</button>
            <button class="btn btn-primary" id="saveMappingBtn">💾 Save Mapping</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Add Rate Modal -->
  <div id="rateModal" class="modal">
    <div class="modal-content">
      <h3>Add GST Rate</h3>
      <div class="form-group">
        <label for="modalRate">GST Rate (%)</label>
        <input type="number" id="modalRate" step="0.01" min="0" max="100" placeholder="e.g., 18">
      </div>
      <div class="form-group">
        <label for="modalLedger">Ledger Name</label>
        <input type="text" id="modalLedger" placeholder="e.g., Local Sale @18%">
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="modalCancelBtn">Cancel</button>
        <button class="btn btn-success" id="modalOkBtn">Add Rate</button>
      </div>
    </div>
  </div>

  <!-- Company Name Modal -->
  <div id="companyModal" class="modal">
    <div class="modal-content">
      <h3 id="companyModalTitle">Add Company</h3>
      <div class="form-group">
        <label for="companyNameInput">Company Name</label>
        <input type="text" id="companyNameInput" placeholder="Enter company name">
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="companyModalCancelBtn">Cancel</button>
        <button class="btn btn-success" id="companyModalOkBtn">OK</button>
      </div>
    </div>
  </div>

</div><!-- /mapping-wrap -->

<!-- ═══════════════════════════════════════════
     ALL JS BELOW IS 100% ORIGINAL — UNTOUCHED
════════════════════════════════════════════ -->
<script>
    (function() {
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            // Group keys (including DEBUG and COMPANY_STATE)
            const groupNames = [
                'COMPANY_STATE',
                'SALES',
                'SALES_IGST',
                'PURCHASE',
                'CGST_RATES',
                'SGST_RATES',
                'IGST_RATES',
                'DEBUG'
            ];

            // State variables
            let companies = [];
            let currentCompany = null;
            let currentGroup = null;
            let currentMapping = null;
            let companyModalMode = 'add'; // 'add' or 'rename'
            let oldCompanyName = null;
            let currentModalGroup = null;

            // DOM elements
            const companyListEl = document.getElementById('companyList');
            const groupListEl = document.getElementById('groupList');
            const rateListEl = document.getElementById('rateList');
            const selectedCompanySpan = document.getElementById('selectedCompany');
            const currentGroupTitle = document.getElementById('currentGroupTitle');
            const renameCompanyBtn = document.getElementById('renameCompanyBtn');
            const deleteCompanyBtn = document.getElementById('deleteCompanyBtn');
            const addRateBtn = document.getElementById('addRateBtn');
            const saveMappingBtn = document.getElementById('saveMappingBtn');

            // Modals
            const companyModal = document.getElementById('companyModal');
            const rateModal = document.getElementById('rateModal');
            const companyModalTitle = document.getElementById('companyModalTitle');
            const companyNameInput = document.getElementById('companyNameInput');
            const companyModalOk = document.getElementById('companyModalOkBtn');
            const companyModalCancel = document.getElementById('companyModalCancelBtn');
            const modalRate = document.getElementById('modalRate');
            const modalLedger = document.getElementById('modalLedger');
            const modalOk = document.getElementById('modalOkBtn');
            const modalCancel = document.getElementById('modalCancelBtn');

            // ===== COMPANY FUNCTIONS =====
            async function loadCompaniesForMapping() {
                if (!companyListEl) return;
                try {
                    const response = await fetch('/api/companies');
                    const data = await response.json();
                    companies = data.companies || [];
                    renderCompanyList();
                    if (companies.length > 0) selectCompany(companies[0]);
                } catch (err) {
                    alert('Failed to load companies. Is the server running?');
                }
            }

            function renderCompanyList() {
                if (!companyListEl) return;
                companyListEl.innerHTML = '';
                companies.forEach(name => {
                    const div = document.createElement('div');
                    div.className = 'company-item' + (name === currentCompany ? ' active' : '');
                    div.textContent = name;
                    div.dataset.name = name;
                    div.addEventListener('click', () => selectCompany(name));
                    companyListEl.appendChild(div);
                });
            }

            async function selectCompany(name) {
                currentCompany = name;
                if (selectedCompanySpan) selectedCompanySpan.textContent = name;
                // Update active class
                document.querySelectorAll('#companyList .company-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.name === name);
                });
                const isDefault = (name === 'Default');
                if (deleteCompanyBtn) deleteCompanyBtn.style.display = isDefault ? 'none' : 'inline-block';
                if (renameCompanyBtn) renameCompanyBtn.style.display = isDefault ? 'none' : 'inline-block';

                try {
                    const response = await fetch(`/api/mapping/${encodeURIComponent(name)}`);
                    currentMapping = await response.json();
                    renderGroupList();
                    if (groupNames.length > 0) selectGroup(groupNames[0]);
                } catch (err) {
                    alert('Failed to load mapping for this company.');
                }
            }

            // ===== GROUP FUNCTIONS =====
            function renderGroupList() {
                if (!groupListEl) return;
                groupListEl.innerHTML = '';
                groupNames.forEach(name => {
                    const div = document.createElement('div');
                    div.className = 'group-item' + (name === currentGroup ? ' active' : '');
                    div.textContent = name;
                    div.dataset.key = name;
                    div.addEventListener('click', () => selectGroup(name));
                    groupListEl.appendChild(div);
                });
            }

            function selectGroup(name) {
                currentGroup = name;
                document.querySelectorAll('#groupList .group-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.key === name);
                });
                if (currentGroupTitle) currentGroupTitle.textContent = `Editing: ${name}`;
                renderRateList(name);
            }

            // ===== RATE FUNCTIONS =====
            function renderRateList(group) {
                if (!rateListEl || !addRateBtn) return;
                const data = currentMapping ? currentMapping[group] : null;

                if (group === 'DEBUG') {
                    const value = data || false;
                    rateListEl.innerHTML = `<div class="rate-item">DEBUG Mode: ${value ? 'Enabled' : 'Disabled'}</div>`;
                    addRateBtn.textContent = 'Toggle DEBUG';
                    addRateBtn.onclick = () => {
                        currentMapping.DEBUG = !currentMapping.DEBUG;
                        renderRateList(group);
                    };
                } else if (group === 'COMPANY_STATE') {
                    const value = data || 'Not set';
                    rateListEl.innerHTML = `<div class="rate-item">Current State: ${value}</div>`;
                    addRateBtn.textContent = 'Change State';
                    addRateBtn.onclick = () => {
                        const newState = prompt('Enter company state:', value);
                        if (newState) {
                            currentMapping.COMPANY_STATE = newState;
                            renderRateList(group);
                        }
                    };
                } else {
                    rateListEl.innerHTML = '';
                    if (!data || Object.keys(data).length === 0) {
                        rateListEl.innerHTML = '<div class="rate-item">No mappings found. Click "Add Rate" to create one.</div>';
                    } else {
                        Object.entries(data)
                            .sort((a, b) => parseFloat(a[0]) - parseFloat(b[0]))
                            .forEach(([rate, ledger]) => {
                                const item = document.createElement('div');
                                item.className = 'rate-item';
                                item.innerHTML = `
                                    <span><b>${rate}%</b> → ${ledger}</span>
                                    <div class="rate-actions">
                                        <button class="btn-edit" data-group="${group}" data-rate="${rate}" data-ledger="${ledger}">✏️</button>
                                        <button class="btn-delete" data-group="${group}" data-rate="${rate}">🗑️</button>
                                    </div>
                                `;
                                rateListEl.appendChild(item);
                            });
                        // Attach event listeners for edit/delete
                        document.querySelectorAll('.btn-edit').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                const group = btn.dataset.group;
                                const rate = btn.dataset.rate;
                                const ledger = btn.dataset.ledger;
                                editRate(group, rate, ledger);
                            });
                        });
                        document.querySelectorAll('.btn-delete').forEach(btn => {
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                const group = btn.dataset.group;
                                const rate = btn.dataset.rate;
                                deleteRate(group, rate);
                            });
                        });
                    }
                    addRateBtn.textContent = '➕ Add Rate';
                    addRateBtn.onclick = () => addRate(group);
                }
            }

            function addRate(group) {
                currentModalGroup = group;
                if (!rateModal || !modalRate || !modalLedger) return;
                modalRate.value = '';
                modalLedger.value = '';
                rateModal.classList.add('show');
            }

            function editRate(group, rate, oldLedger) {
                const newLedger = prompt(`Edit ledger for ${rate}%:`, oldLedger);
                if (newLedger) {
                    currentMapping[group][rate] = newLedger;
                    renderRateList(group);
                }
            }

            function deleteRate(group, rate) {
                if (confirm(`Delete mapping for ${rate}%?`)) {
                    delete currentMapping[group][rate];
                    renderRateList(group);
                }
            }

            // ===== MODAL EVENT LISTENERS =====
            if (modalOk) {
                modalOk.addEventListener('click', () => {
                    if (!rateModal || !modalRate || !modalLedger) return;
                    const rate = modalRate.value.trim();
                    const ledger = modalLedger.value.trim();

                    if (!rate || !ledger) {
                        alert('Please fill both fields');
                        return;
                    }

                    const floatRate = parseFloat(rate);
                    if (isNaN(floatRate) || floatRate < 0 || floatRate > 100) {
                        alert('Invalid rate (must be between 0 and 100)');
                        return;
                    }

                    const group = currentModalGroup;
                    if (!group) {
                        alert('No group selected');
                        rateModal.classList.remove('show');
                        return;
                    }

                    const rateKey = String(floatRate);
                    if (!currentMapping[group]) currentMapping[group] = {};
                    currentMapping[group][rateKey] = ledger;

                    renderRateList(group);

                    rateModal.classList.remove('show');
                    currentModalGroup = null;
                });
            }

            if (modalCancel) {
                modalCancel.addEventListener('click', () => {
                    if (rateModal) rateModal.classList.remove('show');
                    currentModalGroup = null;
                });
            }

            // ===== COMPANY ACTIONS =====
            const addCompanyBtn = document.getElementById('addCompanyBtn');
            if (addCompanyBtn) {
                addCompanyBtn.addEventListener('click', () => {
                    companyModalMode = 'add';
                    if (companyModalTitle) companyModalTitle.textContent = 'Add Company';
                    if (companyNameInput) companyNameInput.value = '';
                    if (companyModal) companyModal.classList.add('show');
                });
            }

            if (renameCompanyBtn) {
                renameCompanyBtn.addEventListener('click', () => {
                    if (!currentCompany || currentCompany === 'Default') {
                        alert('Cannot rename the Default company');
                        return;
                    }
                    companyModalMode = 'rename';
                    oldCompanyName = currentCompany;
                    if (companyModalTitle) companyModalTitle.textContent = 'Rename Company';
                    if (companyNameInput) companyNameInput.value = currentCompany;
                    if (companyModal) companyModal.classList.add('show');
                });
            }

            if (companyModalOk) {
                companyModalOk.addEventListener('click', async () => {
                    if (!companyModal || !companyNameInput) return;
                    const newName = companyNameInput.value.trim();

                    if (!newName) {
                        alert('Please enter a company name');
                        return;
                    }

                    if (companyModalMode === 'add') {
                        const formData = new FormData();
                        formData.append('name', newName);
                        try {
                            const response = await fetch('/api/companies', {
                                method: 'POST',
                                body: formData
                            });
                            if (response.ok) {
                                await loadCompaniesForMapping();
                                await selectCompany(newName);
                                if (typeof loadCompaniesForConverter === 'function') {
                                    loadCompaniesForConverter();
                                }
                            } else {
                                const err = await response.text();
                                alert('Failed to create company: ' + err);
                            }
                        } catch (err) {
                            alert('Error: ' + err.message);
                        }
                    } else if (companyModalMode === 'rename') {
                        if (newName === oldCompanyName) {
                            companyModal.classList.remove('show');
                            return;
                        }
                        if (confirm('Rename will delete the old company and create a new one. Continue?')) {
                            try {
                                const mappingCopy = { ...currentMapping };
                                const deleteRes = await fetch(`/api/companies/${encodeURIComponent(oldCompanyName)}`, {
                                    method: 'DELETE'
                                });
                                if (!deleteRes.ok) throw new Error('Failed to delete old company');
                                const formData = new FormData();
                                formData.append('name', newName);
                                const createRes = await fetch('/api/companies', {
                                    method: 'POST',
                                    body: formData
                                });
                                if (!createRes.ok) throw new Error('Failed to create new company');
                                const saveRes = await fetch(`/api/mapping/${encodeURIComponent(newName)}`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(mappingCopy)
                                });
                                if (!saveRes.ok) throw new Error('Failed to save mapping');
                                await loadCompaniesForMapping();
                                await selectCompany(newName);
                                if (typeof loadCompaniesForConverter === 'function') {
                                    loadCompaniesForConverter();
                                }
                            } catch (error) {
                                alert('Failed to rename company: ' + error.message);
                            }
                        }
                    }

                    companyModal.classList.remove('show');
                    companyModalMode = 'add';
                    oldCompanyName = null;
                });
            }

            if (companyModalCancel) {
                companyModalCancel.addEventListener('click', () => {
                    if (companyModal) companyModal.classList.remove('show');
                    companyModalMode = 'add';
                    oldCompanyName = null;
                });
            }

            if (deleteCompanyBtn) {
                deleteCompanyBtn.addEventListener('click', async () => {
                    if (!currentCompany || currentCompany === 'Default') return;
                    if (!confirm(`Are you sure you want to delete company "${currentCompany}"?`)) return;
                    try {
                        const response = await fetch(`/api/companies/${encodeURIComponent(currentCompany)}`, {
                            method: 'DELETE'
                        });
                        if (response.ok) {
                            await loadCompaniesForMapping();
                            if (typeof loadCompaniesForConverter === 'function') {
                                loadCompaniesForConverter();
                            }
                        } else {
                            const err = await response.text();
                            alert('Failed to delete company: ' + err);
                        }
                    } catch (err) {
                        alert('Error: ' + err.message);
                    }
                });
            }

            // ===== SAVE MAPPING =====
            if (saveMappingBtn) {
                saveMappingBtn.addEventListener('click', async () => {
                    if (!currentCompany) return alert('No company selected');
                    try {
                        const response = await fetch(`/api/mapping/${encodeURIComponent(currentCompany)}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(currentMapping)
                        });
                        if (response.ok) {
                            alert('Mapping saved successfully!');
                        } else {
                            alert('Failed to save mapping.');
                        }
                    } catch (err) {
                        alert('Error saving mapping: ' + err.message);
                    }
                });
            }

            // ===== CLOSE MODALS WHEN CLICKING OUTSIDE =====
            window.addEventListener('click', (e) => {
                if (e.target === companyModal) {
                    companyModal.classList.remove('show');
                    companyModalMode = 'add';
                    oldCompanyName = null;
                }
                if (e.target === rateModal) {
                    rateModal.classList.remove('show');
                    currentModalGroup = null;
                }
            });

            // ===== INIT =====
            loadCompaniesForMapping();
        });
    })();
</script>
</body>
</html>
