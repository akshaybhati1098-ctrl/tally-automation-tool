 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Administrative Infrastructure Workspace Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { border: none; border-radius: 16px; background: #ffffff; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 420px; padding: 40px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="fw-bold text-center text-dark mb-2">Internal Admin Access</h3>
        <p class="text-muted text-center small mb-4">Saas Infrastructure Operational Diagnostic Framework Portal</p>
        
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        
        <form action="/admin/login" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Workspace Account User Handle</label>
                <input type="text" name="username" class="form-control" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Secured Pass Key Matrix</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Execute Security Profile Verification</button>
        </form>
    </div>
</body>
</html>
