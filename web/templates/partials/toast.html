<!-- ═══════════════════════════════════════════════
     TOAST NOTIFICATION SYSTEM
     Drop this partial once — works across all pages
     Call: showToast('Message', 'success' | 'error' | 'warning' | 'info')
     ═══════════════════════════════════════════════ -->

<!-- Toast container — fixed position, renders above everything -->
<div id="toast-container"></div>

<style>
/* ── Toast container ── */
#toast-container {
  position: fixed;
  bottom: 1.8rem;
  right: 1.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  z-index: 9999;
  pointer-events: none;
}

/* ── Individual toast ── */
.toast {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.85rem 1.1rem;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 8px 24px rgba(0, 20, 60, 0.12), 0 2px 6px rgba(0,20,60,0.06);
  min-width: 280px;
  max-width: 360px;
  pointer-events: all;
  position: relative;
  overflow: hidden;

  /* Enter animation */
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.toast.toast-exit {
  animation: toastOut 0.25s ease forwards;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(24px) scale(0.95); }
  to   { opacity: 1; transform: translateX(0)   scale(1); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateX(0)   scale(1);    max-height: 120px; margin-bottom: 0; }
  to   { opacity: 0; transform: translateX(24px) scale(0.95); max-height: 0;     margin-bottom: -0.6rem; }
}

/* ── Accent bar on left edge ── */
.toast::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 14px 0 0 14px;
}

.toast-success::before { background: var(--green); }
.toast-error::before   { background: #e02020; }
.toast-warning::before { background: #f5a623; }
.toast-info::before    { background: var(--accent); }

/* ── Icon bubble ── */
.toast-icon {
  width: 32px; height: 32px;
  border-radius: 9px;
  display: grid; place-items: center;
  font-size: 1rem;
  flex-shrink: 0;
}

.toast-success .toast-icon { background: rgba(23,178,106,0.12); }
.toast-error   .toast-icon { background: rgba(224,32,32,0.1);   }
.toast-warning .toast-icon { background: rgba(245,166,35,0.12); }
.toast-info    .toast-icon { background: rgba(22,81,232,0.1);   }

/* ── Text ── */
.toast-body { flex: 1; }

.toast-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.83rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 0.1rem;
  line-height: 1.2;
}

.toast-msg {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.5;
}

/* ── Close button ── */
.toast-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 0.9rem;
  padding: 0;
  line-height: 1;
  transition: color 0.15s;
  flex-shrink: 0;
  margin-top: 0.05rem;
}

.toast-close:hover { color: var(--ink); }

/* ── Progress bar (auto-dismiss countdown) ── */
.toast-progress {
  position: absolute;
  bottom: 0; left: 0;
  height: 2px;
  border-radius: 0 0 14px 14px;
  animation: toastProgress linear forwards;
}

.toast-success .toast-progress { background: var(--green); }
.toast-error   .toast-progress { background: #e02020; }
.toast-warning .toast-progress { background: #f5a623; }
.toast-info    .toast-progress { background: var(--accent); }

@keyframes toastProgress {
  from { width: 100%; }
  to   { width: 0%; }
}

/* ── Responsive ── */
@media (max-width: 500px) {
  #toast-container {
    bottom: 1rem;
    right: 1rem;
    left: 1rem;
  }
  .toast { min-width: unset; max-width: 100%; }
}
</style>

<script>
(function () {
  /* ── Config ── */
  const DEFAULTS = {
    duration: 3500,   // ms before auto-dismiss
    maxToasts: 5,     // max visible at once
  };

  const TYPES = {
    success: { icon: '✅', title: 'Success' },
    error:   { icon: '❌', title: 'Error'   },
    warning: { icon: '⚠️', title: 'Warning' },
    info:    { icon: 'ℹ️', title: 'Info'    },
  };

  /* ── Core function ── */
  window.showToast = function (message, type = 'info', title = null, duration = DEFAULTS.duration) {
    const container = document.getElementById('toast-container');

    // Enforce max
    const existing = container.querySelectorAll('.toast');
    if (existing.length >= DEFAULTS.maxToasts) dismissToast(existing[0]);

    const cfg = TYPES[type] || TYPES.info;
    const resolvedTitle = title || cfg.title;

    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
      <div class="toast-icon">${cfg.icon}</div>
      <div class="toast-body">
        <div class="toast-title">${resolvedTitle}</div>
        <div class="toast-msg">${message}</div>
      </div>
      <button class="toast-close" aria-label="Close">✕</button>
      <div class="toast-progress" style="animation-duration: ${duration}ms"></div>
    `;

    // Close button
    toast.querySelector('.toast-close').addEventListener('click', () => dismissToast(toast));

    container.appendChild(toast);

    // Auto dismiss
    const timer = setTimeout(() => dismissToast(toast), duration);
    toast._timer = timer;
  };

  function dismissToast(toast) {
    if (!toast || toast._dismissed) return;
    toast._dismissed = true;
    clearTimeout(toast._timer);
    toast.classList.add('toast-exit');
    toast.addEventListener('animationend', () => toast.remove(), { once: true });
  }

  /* ── Convenience shorthands ── */
  window.toastSuccess = (msg, title) => showToast(msg, 'success', title);
  window.toastError   = (msg, title) => showToast(msg, 'error',   title);
  window.toastWarning = (msg, title) => showToast(msg, 'warning', title);
  window.toastInfo    = (msg, title) => showToast(msg, 'info',    title);

})();
</script>
