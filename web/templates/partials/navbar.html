<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshay's Tally Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4fa;
    display: flex;
    min-height: 100vh;
}

/* ── SIDEBAR (vertical left nav) ── */
.top-nav {
    background: white;
    border-radius: 0 24px 24px 0;
    box-shadow: 6px 0 30px -5px rgba(0, 20, 40, 0.12);
    padding: 1.8rem 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.4rem;
    border-right: 1px solid rgba(220, 230, 245, 0.8);
    width: 220px;
    min-height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    transition: all 0.2s ease;
    z-index: 100;
}

.top-nav:hover {
    box-shadow: 8px 0 35px -5px rgba(0, 30, 60, 0.18);
}

/* Logo block */
.logo {
    margin-bottom: 1.4rem;
    padding-bottom: 1.2rem;
    border-bottom: 1.5px solid #e4ecf7;
    width: 100%;
}

.logo h2 {
    font-size: 1.15rem;
    font-weight: 750;
    background: linear-gradient(135deg, #1e2b4f, #2a3f6e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
    line-height: 1.3;
}

.logo p {
    font-size: 0.75rem;
    color: #8a9fbc;
    margin-top: 0.2rem;
    font-weight: 500;
    letter-spacing: 0.02em;
}

/* Nav links — vertical stack */
.nav-links {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    width: 100%;
    flex: 1;
}

.nav-link {
    background: transparent;
    border: none;
    padding: 0.65rem 1rem;
    border-radius: 12px;
    font-size: 0.92rem;
    font-weight: 500;
    color: #3a4e6e;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    white-space: nowrap;
    width: 100%;
    text-align: left;
}

.nav-link:hover {
    background: #e8f0fc;
    color: #0f1a2e;
    transform: translateX(4px);
}

.nav-link.active {
    background: linear-gradient(135deg, #1e2b4f, #2a4080);
    color: white;
    box-shadow: 0 4px 12px rgba(30, 43, 79, 0.25);
}

.nav-link:active {
    transform: scale(0.97);
}

/* Logout — pinned to bottom */
#logout-btn {
    margin-top: auto;
    color: #c0392b;
    border-top: 1.5px solid #e4ecf7;
    padding-top: 1rem;
    margin-top: 1rem;
}

#logout-btn:hover {
    background: #fdecea;
    color: #a93226;
    transform: translateX(4px);
}

/* Main content area offset */
.main-content {
    margin-left: 220px;
    padding: 2rem;
    flex: 1;
}

/* Responsive */
@media (max-width: 700px) {
    .top-nav {
        width: 100%;
        min-height: auto;
        position: relative;
        border-radius: 0 0 20px 20px;
        flex-direction: column;
        padding: 1rem;
    }
    .main-content {
        margin-left: 0;
    }
    .nav-link {
        font-size: 0.85rem;
    }
}
</style>
</head>
<body>

<!-- LEFT VERTICAL SIDEBAR -->
<div class="top-nav">
    <div class="logo">
        <h2>Akshay's Tally Tool</h2>
        <p>v3.3 • Tally-Inspired</p>
    </div>
    <div class="nav-links">
        <button class="nav-link protected active" data-page="dashboard" onclick="navigateTo('dashboard'); setActive(this)">🏠 Dashboard</button>
        <button class="nav-link protected" data-page="converter" onclick="navigateTo('converter'); setActive(this)">🔄 Excel → XML</button>
        <button class="nav-link protected" data-page="mapping" onclick="navigateTo('mapping'); setActive(this)">⚙️ Mapping Editor</button>
        <button class="nav-link protected" data-page="settings" onclick="navigateTo('settings'); setActive(this)">⚙️ Settings</button>
        <button class="nav-link public" id="login-btn" onclick="window.location.href='/login'">🔑 Login</button>
        <button class="nav-link public" id="signup-btn" onclick="window.location.href='/signup'">📝 Sign Up</button>
        <button class="nav-link protected" id="logout-btn" onclick="logout()">🚪 Logout <span id="username-display"></span></button>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="page active" id="dashboard"><h2>📊 Dashboard Page</h2></div>
    <div class="page" id="converter"><h2>🔄 Converter Page</h2></div>
    <div class="page" id="mapping"><h2>⚙️ Mapping Editor Page</h2></div>
    <div class="page" id="settings"><h2>⚙️ Settings Page</h2></div>
</div>

<script>
// Simulate logged-in user for preview
window.currentUser = 'Akshay';

function updateNavbarVisibility() {
    const isLoggedIn = window.currentUser && window.currentUser !== '';
    document.querySelectorAll('.nav-link.protected').forEach(btn => {
        btn.style.display = isLoggedIn ? 'flex' : 'none';
    });
    document.querySelectorAll('.nav-link.public').forEach(btn => {
        btn.style.display = isLoggedIn ? 'none' : 'flex';
    });
    if (isLoggedIn) {
        document.getElementById('username-display').textContent = `(${window.currentUser})`;
    }
}

async function logout() {
    try {
        const response = await fetch('/logout', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        const data = await response.json();
        if (data.success) {
            window.currentUser = '';
            updateNavbarVisibility();
            window.location.href = data.redirect;
        }
    } catch (error) {
        window.currentUser = '';
        updateNavbarVisibility();
    }
}

function setActive(clickedButton) {
    document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
    clickedButton.classList.add('active');
}

function navigateTo(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(page).style.display = 'block';
}

document.addEventListener('DOMContentLoaded', () => {
    updateNavbarVisibility();
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById('dashboard').style.display = 'block';
});
</script>
</body>
</html>
