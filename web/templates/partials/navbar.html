<!-- ═══════════════════════════════════════════════
     TOP NAVIGATION — matches dashboard design system
     Fonts: Syne (brand) + DM Sans (body)
     Colors: same CSS variables as dashboard
     Include AFTER loading the Google Fonts link below
     ═══════════════════════════════════════════════ -->

<!-- Paste this <link> inside your page's <head> if not already present -->
<!-- <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"> -->

<nav class="top-nav">

  <!-- Brand -->
  <div class="tn-brand">
    <div class="tn-logo">🧾</div>
    <div class="tn-brand-text">
      <span class="tn-name">Tally Tool</span>
      <span class="tn-meta">by Akshay · v3.3</span>
    </div>
  </div>

  <!-- Nav links -->
  <div class="tn-links">
    <!-- Protected (logged in) -->
    <button class="tn-btn protected" data-page="dashboard"  onclick="navigateTo('dashboard');  setActive(this)">🏠 Dashboard</button>
    <button class="tn-btn protected" data-page="converter"  onclick="navigateTo('converter');  setActive(this)">🔄 Excel → XML</button>
    <button class="tn-btn protected" data-page="mapping"    onclick="navigateTo('mapping');    setActive(this)">⚙️ Mapping</button>
    <button class="tn-btn protected" data-page="settings"   onclick="navigateTo('settings');   setActive(this)">🛠️ Settings</button>
    <button class="tn-btn protected tn-logout" id="logout-btn" onclick="logout()">
      🚪 Logout <span class="tn-user" id="username-display"></span>
    </button>

    <!-- Public (logged out) -->
    <button class="tn-btn public tn-login"  id="login-btn"  onclick="window.location.href='/login'">🔑 Login</button>
    <button class="tn-btn public tn-signup" id="signup-btn" onclick="window.location.href='/signup'">📝 Sign Up</button>
  </div>

</nav>

<style>
/* ── CSS variables (mirror dashboard; safe to declare again) ── */
:root {
  --ink:     #0d1117;
  --ink2:    #1c2534;
  --ink3:    #354460;
  --muted:   #7a8fa8;
  --line:    #dce5f0;
  --surface: #f5f8fc;
  --white:   #ffffff;
  --accent:  #1651e8;
  --green:   #17b26a;
}

/* ── Nav wrapper ── */
.top-nav {
  max-width: 1160px;
  width: 100%;
  margin: 0 auto 1.5rem;
  padding: 0.85rem 1.4rem;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: 0 2px 10px rgba(0, 20, 60, 0.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  font-family: 'DM Sans', sans-serif;
}

/* ── Brand ── */
.tn-brand {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  text-decoration: none;
}

.tn-logo {
  width: 38px; height: 38px;
  background: var(--ink);
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 1.15rem;
  flex-shrink: 0;
}

.tn-brand-text {
  display: flex;
  flex-direction: column;
  gap: 0.05rem;
}

.tn-name {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--ink);
  line-height: 1.1;
}

.tn-meta {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ── Link group ── */
.tn-links {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.3rem;
}

/* ── Individual buttons ── */
.tn-btn {
  background: transparent;
  border: none;
  padding: 0.5rem 0.95rem;
  border-radius: 100px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.83rem;
  font-weight: 500;
  color: var(--ink3);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, transform 0.15s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  white-space: nowrap;
  line-height: 1;
}

.tn-btn:hover {
  background: var(--surface);
  color: var(--ink);
  transform: translateY(-1px);
}

.tn-btn:active {
  transform: scale(0.97);
}

/* Active page highlight */
.tn-btn.active {
  background: var(--ink);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(13, 17, 23, 0.2);
}

.tn-btn.active:hover {
  background: var(--ink2);
  color: var(--white);
}

/* Logout — subtle red tint on hover */
.tn-logout:hover {
  background: rgba(220, 38, 38, 0.07);
  color: #b91c1c;
}

/* Login — accent tint */
.tn-login {
  border: 1px solid var(--line);
}

.tn-login:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(22, 81, 232, 0.06);
}

/* Sign up — filled accent */
.tn-signup {
  background: var(--accent);
  color: var(--white) !important;
  font-weight: 600;
}

.tn-signup:hover {
  background: #0f3dbf;
  color: var(--white);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(22, 81, 232, 0.3);
}

/* Username chip inside logout button */
.tn-user {
  font-size: 0.72rem;
  background: rgba(13,17,23,0.08);
  padding: 0.1rem 0.45rem;
  border-radius: 100px;
  margin-left: 0.1rem;
  color: var(--ink3);
}

/* ── Responsive ── */
@media (max-width: 700px) {
  .top-nav {
    flex-direction: column;
    align-items: flex-start;
    padding: 1rem 1.1rem;
    border-radius: 18px;
  }

  .tn-links {
    width: 100%;
    gap: 0.25rem;
  }

  .tn-btn {
    flex: 1;
    justify-content: center;
    padding: 0.5rem 0.4rem;
    font-size: 0.78rem;
  }
}
</style>

<script>
/* ── Auth visibility ── */
function updateNavbarVisibility() {
  const isLoggedIn = window.currentUser && window.currentUser !== '';
  document.querySelectorAll('.tn-btn.protected').forEach(b => b.style.display = isLoggedIn ? 'flex' : 'none');
  document.querySelectorAll('.tn-btn.public').forEach(b => b.style.display = isLoggedIn ? 'none' : 'flex');
  if (isLoggedIn) {
    const el = document.getElementById('username-display');
    if (el) el.textContent = window.currentUser;
  }
}

/* ── Active state ── */
function setActive(clickedBtn) {
  document.querySelectorAll('.tn-btn').forEach(b => b.classList.remove('active'));
  clickedBtn.classList.add('active');
}

/* ── Logout ── */
async function logout() {
  try {
    const res  = await fetch('/logout', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
    const data = await res.json();
    if (data.success) {
      window.currentUser = '';
      updateNavbarVisibility();
      window.location.href = data.redirect;
    }
  } catch {
    window.location.href = '/login';
  }
}

/* ── Navigation ── */
function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById(page);
  if (el) el.classList.add('active');
}

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  updateNavbarVisibility();
  // Auto-highlight based on current page if data-page matches
  const current = document.body.dataset.page;
  if (current) {
    const btn = document.querySelector(`.tn-btn[data-page="${current}"]`);
    if (btn) btn.classList.add('active');
  }
});
</script>
